<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f2f7f3" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <title>memomo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f7f3;
      --panel: #f7fbf8;
      --line: #dce8de;
      --text: #223028;
      --muted: #627369;
      --accent: #1b8f57;
      --hover: #edf6ef;
      --active: #dff2e5;
      --warn: #ad2e24;
      --panel-input: #ffffff;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1612;
      --panel: #141d18;
      --line: #27352d;
      --text: #dce9e0;
      --muted: #93a79a;
      --accent: #3ab374;
      --hover: #1a2a21;
      --active: #203529;
      --warn: #f17a6f;
      --panel-input: #1b2720;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); }

    .layout { display: grid; grid-template-columns: 56px 300px 1fr; min-height: 100vh; }

    .iconbar { border-right: 1px solid var(--line); padding: 10px 8px; display: flex; flex-direction: column; gap: 8px; background: var(--panel); }
    .icon-btn { border: 0; border-radius: 10px; background: transparent; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: var(--hover); }
    .icon-btn.active { background: var(--active); }
    .material-symbols-outlined { font-size: 20px; }

    .sidebar { border-right: 1px solid var(--line); padding: 14px; overflow: auto; background: var(--panel); }
    .panel { display: none; }
    .panel.active { display: block; }

    .main { padding: 12px 22px 22px; overflow: auto; }
    input, textarea, select {
      width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px;
      margin-top: 6px; margin-bottom: 10px; background: var(--panel-input, #fff); color: var(--text);
    }
    button { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; background: var(--panel-input, #fff); color: var(--text); cursor: pointer; }
    button:hover { background: var(--hover); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.danger { border-color: #f2c9c7; color: var(--warn); }

    .muted { font-size: 12px; color: var(--muted); }
    .card { border: 1px solid var(--line); border-radius: 10px; padding: 10px; margin-bottom: 10px; background: var(--panel-input, #fff); }
    .toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
    .topbar-left, .topbar-right { display: flex; gap: 6px; align-items: center; }
    .icon-inline-btn { width: 34px; height: 34px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

    #editor { border: 0; min-height: 72vh; padding: 2px 0; outline: none; white-space: pre-wrap; line-height: 1.65; background: transparent; }
    .editor-shell { border-top: 1px solid var(--line); padding-top: 10px; background: transparent; }
    .write-toolbar { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .write-btn { padding: 4px 8px; border-radius: 6px; font-size: 12px; }

    .line-h1 { font-size: 1.8rem; font-weight: 700; }
    .line-h2 { font-size: 1.45rem; font-weight: 700; }
    .line-h3 { font-size: 1.2rem; font-weight: 700; }
    .line-list { padding-left: 10px; }
    .line-code { font-family: ui-monospace, monospace; background: #edf4ef; border-radius: 6px; padding: 2px 6px; display: inline-block; }

    .note-btn, .tree-btn { width: 100%; text-align: left; margin-bottom: 6px; border: 0; background: transparent; padding: 8px; border-radius: 8px; }
    .note-btn:hover, .tree-btn:hover { background: var(--hover); }
    .note-btn.active, .tree-btn.active { background: var(--active); }
    .tree-row { display: flex; align-items: center; gap: 4px; }
    .tree-toggle { width: 22px; height: 22px; border: 0; background: transparent; border-radius: 6px; color: var(--muted); padding: 0; margin: 0; }

    #metaMenu {
      display: none;
      position: fixed;
      top: 52px;
      right: 14px;
      width: min(360px, calc(100vw - 28px));
      z-index: 30;
      max-height: calc(100vh - 70px);
      overflow: auto;
    }
    #metaMenu.open { display: block; }

    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000040;
      z-index: 15;
    }
    body.sidebar-open .mobile-overlay { display: block; }

    .asset-preview { max-width: 100%; border-radius: 8px; border: 1px solid var(--line); }

    #slashMenu {
      display: none;
      position: fixed;
      z-index: 40;
      min-width: 220px;
      max-width: 280px;
      background: var(--panel-input, #fff);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 8px 20px #00000020;
      padding: 6px;
    }
    #slashMenu.open { display: block; }
    .slash-item {
      width: 100%;
      border: 0;
      text-align: left;
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
    }
    .slash-item:hover { background: var(--hover); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .iconbar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 56px;
        z-index: 20;
      }
      .sidebar {
        position: fixed;
        left: 56px;
        top: 0;
        bottom: 0;
        width: min(300px, calc(100vw - 56px));
        z-index: 20;
        transform: translateX(-120%);
        transition: transform .2s ease;
      }
      body.sidebar-open .sidebar { transform: translateX(0); }
      .main { margin-left: 56px; padding: 10px 12px 16px; }
      #editor { min-height: 78vh; }
      .write-toolbar { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
      .write-btn { white-space: nowrap; }
    }
  </style>
</head>
<body>
  <!-- Markdown compatibility marker -->
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <div id="metaMenu" class="card">
    <h3 style="margin:0 0 8px;">ページ設定</h3>
    <label>タイトル</label>
    <input id="title" placeholder="タイトル" />
    <label>タグ</label>
    <input id="folders" placeholder="例: project/memomo/spec" />
    <label>アイコン</label>
    <input id="metaIcon" placeholder="例: 📘" />
    <label>色</label>
    <input id="metaColor" placeholder="例: green" />
    <label><input id="metaPinned" type="checkbox" style="width:auto; margin-right:6px;" /> ピン留め</label>
    <label>追加プロパティ（JSON）</label>
    <textarea id="metaProps" rows="4" placeholder='{"owner":"me"}'></textarea>
    <button id="metaSaveBtn" class="primary">保存</button>
  </div>

  <div class="layout">
    <nav class="iconbar">
      <button class="icon-btn active" data-panel="new" title="メモ"><span class="material-symbols-outlined">edit_note</span></button>
      <button class="icon-btn" data-panel="search" title="検索"><span class="material-symbols-outlined">search</span></button>
      <button class="icon-btn" data-panel="other" title="AI"><span class="material-symbols-outlined">smart_toy</span></button>
      <button class="icon-btn" data-panel="assets" title="アセット"><span class="material-symbols-outlined">inventory_2</span></button>
      <button class="icon-btn" data-panel="conflicts" title="競合"><span class="material-symbols-outlined">warning</span></button>
      <button class="icon-btn" data-panel="settings" title="設定"><span class="material-symbols-outlined">settings</span></button>
    </nav>

    <aside class="sidebar">
      <section class="panel active" data-panel="new">
        <h3 style="margin:0 0 8px;">メモ</h3>
        <button id="newBtn" class="primary">新規</button>
        <label class="muted">タグで絞り込み</label>
        <input id="folderFilter" placeholder="例: project/memomo" />
        <div class="toolbar"><button id="clearFilterBtn">解除</button></div>
        <div id="folderTree" class="card"></div>
        <div id="noteList"></div>
      </section>

      <section class="panel" data-panel="search">
        <h3 style="margin:0 0 8px;">検索</h3>
        <input id="query" placeholder="キーワード" />
        <button id="searchBtn">検索</button>
        <div id="searchResult"></div>
      </section>

      <section class="panel" data-panel="other">
        <h3 style="margin:0 0 8px;">AI検索</h3>
        <input id="aiQuery" placeholder="自然言語" />
        <button id="aiSearchBtn">実行</button>
        <p id="aiSummary" class="muted"></p>
      </section>

      <section class="panel" data-panel="assets">
        <h3 style="margin:0 0 8px;">アセット</h3>
        <div id="assetList"></div>
      </section>

      <section class="panel" data-panel="conflicts">
        <h3 style="margin:0 0 8px;">競合</h3>
        <button id="reloadConflictBtn">更新</button>
        <div id="conflictList"></div>
      </section>

      <section class="panel" data-panel="settings">
        <h3 style="margin:0 0 8px;">設定</h3>
        <label class="muted">自動保存（秒）</label>
        <select id="autosaveSec">
          <option value="0">オフ</option>
          <option value="3" selected>3</option>
          <option value="5">5</option>
          <option value="10">10</option>
        </select>
        <button id="syncNowBtn">同期</button>
        <button id="vacuumBtn">VACUUM</button>
        <p id="settingsStatus" class="muted"></p>
      </section>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button id="panelMenuBtn" class="icon-inline-btn" title="パネル"><span class="material-symbols-outlined">menu_open</span></button>
          <button id="saveBtn" class="primary">保存</button>
          <button id="deleteBtn" class="danger">削除</button>
        </div>
        <div class="topbar-right">
          <span id="syncStatus" class="muted">online</span>
          <button id="themeToggleBtn" class="icon-inline-btn" title="テーマ切替"><span class="material-symbols-outlined">dark_mode</span></button>
          <button id="metaMenuBtn" class="icon-inline-btn" title="ページ設定"><span class="material-symbols-outlined">tune</span></button>
        </div>
      </div>

      <div id="pageHeader" class="card" style="padding:8px 10px; margin-bottom:8px;">
        <div id="pageMetaLine" class="muted">No metadata</div>
      </div>

      <div class="write-toolbar">
        <button type="button" class="write-btn" data-insert="h1">H1</button>
        <button type="button" class="write-btn" data-insert="h2">H2</button>
        <button type="button" class="write-btn" data-insert="bold">太字</button>
        <button type="button" class="write-btn" data-insert="list">箇条書き</button>
        <button type="button" class="write-btn" data-insert="quote">引用</button>
        <button type="button" class="write-btn" data-insert="code">コード</button>
        <button type="button" class="write-btn" data-insert="check">チェック</button>
        <button type="button" class="write-btn" data-insert="table">表</button>
        <button type="button" class="write-btn" data-insert="toggle">トグル</button>
        <button type="button" class="write-btn" data-insert="divider">区切り</button>
      </div>

      <div class="editor-shell"><div id="editor" contenteditable="true" spellcheck="false"></div></div>
      <p id="status" class="muted"></p>
    </main>
  </div>

  <div id="slashMenu"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
